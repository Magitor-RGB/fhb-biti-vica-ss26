name: "Reinberg Deploy Infrastructure"
on: workflow_dispatch

jobs:
  terraform:
    runs-on: ubuntu-latest

    # Sagt GitHub Actions, dass alle folgenden 'run' Befehle in diesem Ordner starten sollen
    defaults:
      run:
        working-directory: ./Reinberg-Leibel_Albert/Abgabe_2_260606

    env:
      EXOSCALE_API_KEY: ${{ secrets.EXOSCALE_API_KEY }}
      EXOSCALE_API_SECRET: ${{ secrets.EXOSCALE_API_SECRET }}
      
      # Fix for the Node.js 20 deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve 
